# N.O.T website — nginx. Install with scripts/install-nginx.sh
upstream not_ui {
    server 127.0.0.1:8083;
    keepalive 64;
}

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name neworigin.tech www.neworigin.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name neworigin.tech www.neworigin.tech;

    ssl_certificate     /etc/letsencrypt/live/neworigin.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/neworigin.tech/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/not_ui_access.log;
    error_log /var/log/nginx/not_ui_error.log;

    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location / {
        proxy_pass http://not_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
